<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0a0a0f"/>
  
  <!-- Cyber Grid -->
  <path d="M 0,50 L 400,50 M 0,100 L 400,100 M 0,150 L 400,150 M 0,200 L 400,200 M 50,0 L 50,250 M 100,0 L 100,250 M 150,0 L 150,250 M 200,0 L 200,250 M 250,0 L 250,250 M 300,0 L 300,250 M 350,0 L 350,250" stroke="#141424" stroke-width="1"/>
  
  <!-- Glowing Effects -->
  <defs>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Puzzle piece / Extension graphics -->
  <g transform="translate(200, 120)">
    <!-- Tech Extension Framework -->
    <polygon points="-75,-75 25,-75 75,-25 75,75 -25,75 -75,25" fill="#0d0d18" stroke="#ff0055" stroke-width="2" filter="url(#glow-magenta)"/>
    
    <!-- Inner Adobe Styled 'A' glowing in neon purple -->
    <path d="M -25,40 L 0,-30 L 25,40 M -17,20 L 17,20" fill="none" stroke="#bd00ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-purple)"/>
    <path d="M -25,40 L 0,-30 L 25,40 M -17,20 L 17,20" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Enhancer sparkles / sparks -->
    <!-- Spark 1 -->
    <path d="M 40,-45 C 40,-42 42,-40 45,-40 C 42,-40 40,-38 40,-35 C 40,-38 38,-40 35,-40 C 38,-40 40,-42 40,-45 Z" fill="#00f0ff" filter="url(#glow-magenta)"/>
    <!-- Spark 2 -->
    <path d="M -45,-30 C -45,-28 -43,-26 -40,-26 C -43,-26 -45,-24 -45,-22 C -45,-24 -47,-26 -50,-26 C -47,-26 -45,-28 -45,-30 Z" fill="#00f0ff" filter="url(#glow-magenta)"/>
    <!-- Spark 3 -->
    <path d="M 30,35 C 30,38 32,40 35,40 C 32,40 30,42 30,45 C 30,42 28,40 25,40 C 28,40 30,38 30,35 Z" fill="#bd00ff" filter="url(#glow-purple)"/>

    <!-- Tech Grid Circle Overlay -->
    <circle cx="0" cy="5" r="55" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.3" stroke-dasharray="4 6"/>
    
    <!-- Right click context menu simulation -->
    <g transform="translate(45, 10)">
      <rect x="0" y="0" width="80" height="50" rx="3" fill="#070710" stroke="#00f0ff" stroke-width="1" opacity="0.95"/>
      <line x1="0" y1="16" x2="80" y2="16" stroke="#14142c" stroke-width="1"/>
      <text x="8" y="11" fill="#00f0ff" font-family="monospace" font-size="6.5" font-weight="bold">AEM ACTIONS</text>
      <text x="8" y="27" fill="#ffffff" font-family="sans-serif" font-size="7">Copy Path</text>
      <text x="8" y="39" fill="#ffffff" font-family="sans-serif" font-size="7">Open in CRXDE</text>
      <!-- Selection highlight -->
      <rect x="2" y="31" width="76" height="10" fill="#ff0055" opacity="0.3"/>
    </g>
  </g>

  <!-- Header text -->
  <text x="25" y="32" fill="#ff0055" font-family="monospace" font-size="10" font-weight="bold" letter-spacing="1">PLUGIN_STATUS: STABLE</text>

  <!-- Corners -->
  <path d="M 10,20 L 10,10 L 20,10" fill="none" stroke="#ff0055" stroke-width="2"/>
  <path d="M 390,20 L 390,10 L 380,10" fill="none" stroke="#ff0055" stroke-width="2"/>
  <path d="M 10,230 L 10,240 L 20,240" fill="none" stroke="#ff0055" stroke-width="2"/>
  <path d="M 390,230 L 390,240 L 380,240" fill="none" stroke="#ff0055" stroke-width="2"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0a0a0f"/>
  
  <!-- Cyber Grid -->
  <path d="M 0,50 L 400,50 M 0,100 L 400,100 M 0,150 L 400,150 M 0,200 L 400,200 M 50,0 L 50,250 M 100,0 L 100,250 M 150,0 L 150,250 M 200,0 L 200,250 M 250,0 L 250,250 M 300,0 L 300,250 M 350,0 L 350,250" stroke="#141424" stroke-width="1"/>
  
  <!-- Glowing Effects -->
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Network Dependency Connections -->
  <g opacity="0.6">
    <line x1="80" y1="60" x2="160" y2="90" stroke="#00f0ff" stroke-width="2" stroke-dasharray="3 3"/>
    <line x1="160" y1="90" x2="110" y2="180" stroke="#39ff14" stroke-width="1.5"/>
    <line x1="160" y1="90" x2="240" y2="70" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="240" y1="70" x2="320" y2="100" stroke="#39ff14" stroke-width="2" stroke-dasharray="6 3"/>
    <line x1="240" y1="70" x2="280" y2="180" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="320" y1="100" x2="280" y2="180" stroke="#39ff14" stroke-width="1"/>
    <line x1="110" y1="180" x2="200" y2="210" stroke="#00f0ff" stroke-width="1"/>
    <line x1="280" y1="180" x2="200" y2="210" stroke="#39ff14" stroke-width="2"/>
  </g>

  <!-- Network Nodes -->
  <circle cx="80" cy="60" r="6" fill="#00f0ff" filter="url(#glow-cyan)"/>
  <circle cx="160" cy="90" r="8" fill="#39ff14" filter="url(#glow-green)"/>
  <circle cx="240" cy="70" r="9" fill="#00f0ff" filter="url(#glow-cyan)"/>
  <circle cx="320" cy="100" r="7" fill="#39ff14" filter="url(#glow-green)"/>
  <circle cx="110" cy="180" r="7" fill="#39ff14" filter="url(#glow-green)"/>
  <circle cx="280" cy="180" r="8" fill="#00f0ff" filter="url(#glow-cyan)"/>
  <circle cx="200" cy="210" r="10" fill="#39ff14" filter="url(#glow-green)"/>

  <!-- Center Tux / Tech overlay silhouette inside node -->
  <g transform="translate(200,125) scale(0.9)">
    <!-- Tech diamond frame -->
    <polygon points="0,-45 45,0 0,45 -45,0" fill="#08080c" stroke="#39ff14" stroke-width="2" filter="url(#glow-green)" />
    
    <!-- Linux Penguin Silhouette / Code representation -->
    <path d="M -15,15 C -15,5 -10,-15 0,-15 C 10,-15 15,5 15,15 C 15,22 10,25 0,25 C -10,25 -15,22 -15,15 Z" fill="#39ff14" opacity="0.3"/>
    <path d="M -8,5 L 8,5 M -5,10 L 5,10" stroke="#39ff14" stroke-width="2" stroke-linecap="round"/>
    <polygon points="-3,-5 0,-2 3,-5" fill="#39ff14"/>
    
    <!-- Code decoration -->
    <text x="0" y="38" fill="#39ff14" font-family="'Courier New', monospace" font-size="8" font-weight="bold" text-anchor="middle">DEP_MAP</text>
  </g>

  <!-- Cyberpunk UI elements -->
  <text x="20" y="30" fill="#39ff14" font-family="monospace" font-size="10" opacity="0.8">SYS.AUDIT: OK</text>
  <rect x="330" y="20" width="50" height="15" fill="none" stroke="#00f0ff" stroke-width="1"/>
  <text x="355" y="31" fill="#00f0ff" font-family="monospace" font-size="8" text-anchor="middle" font-weight="bold">v2.4.0</text>
  
  <!-- Corners -->
  <path d="M 10,20 L 10,10 L 20,10" fill="none" stroke="#39ff14" stroke-width="2"/>
  <path d="M 390,20 L 390,10 L 380,10" fill="none" stroke="#39ff14" stroke-width="2"/>
  <path d="M 10,230 L 10,240 L 20,240" fill="none" stroke="#39ff14" stroke-width="2"/>
  <path d="M 390,230 L 390,240 L 380,240" fill="none" stroke="#39ff14" stroke-width="2"/>
</svg>

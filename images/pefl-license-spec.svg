<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0a0a0f"/>
  
  <!-- Cyber Grid -->
  <path d="M 0,50 L 400,50 M 0,100 L 400,100 M 0,150 L 400,150 M 0,200 L 400,200 M 50,0 L 50,250 M 100,0 L 100,250 M 150,0 L 150,250 M 200,0 L 200,250 M 250,0 L 250,250 M 300,0 L 300,250 M 350,0 L 350,250" stroke="#141424" stroke-width="1"/>
  
  <!-- Glowing Effects -->
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Circuit Traces -->
  <path d="M 50,75 L 120,75 L 150,105 L 150,170" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.4"/>
  <circle cx="50" cy="75" r="3" fill="#00f0ff" opacity="0.5"/>
  <path d="M 350,175 L 280,175 L 250,145 L 250,80" fill="none" stroke="#ff0055" stroke-width="1.5" opacity="0.4"/>
  <circle cx="350" cy="175" r="3" fill="#ff0055" opacity="0.5"/>

  <!-- Tech Shield/License Icon -->
  <g transform="translate(200, 120)">
    <!-- Outer Octagon Hex Frame -->
    <polygon points="-60,-80 60,-80 100,-40 100,40 60,80 -60,80 -100,40 -100,-40" fill="none" stroke="#ff0055" stroke-width="2.5" filter="url(#glow-magenta)"/>
    <polygon points="-53,-73 53,-73 90,-36 90,36 53,73 -53,73 -90,36 -90,-36" fill="none" stroke="#00f0ff" stroke-width="1.5" filter="url(#glow-cyan)"/>
    
    <!-- Document details -->
    <path d="-40,-40 L 40,-40 M -40,-20 L 20,-20 M -40,0 L 40,0 M -40,20 L 10,20" stroke="#00f0ff" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Hologram lines -->
    <line x1="-80" y1="50" x2="80" y2="50" stroke="#ff0055" stroke-width="1" opacity="0.6" stroke-dasharray="8 4"/>
    <line x1="-80" y1="-50" x2="80" y2="-50" stroke="#ff0055" stroke-width="1" opacity="0.6" stroke-dasharray="4 8"/>
    
    <!-- Code text -->
    <text x="0" y="42" fill="#00f0ff" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="3">PEFL v1.0</text>
  </g>
  
  <!-- Corners -->
  <path d="M 10,20 L 10,10 L 20,10" fill="none" stroke="#ff0055" stroke-width="2"/>
  <path d="M 390,20 L 390,10 L 380,10" fill="none" stroke="#ff0055" stroke-width="2"/>
  <path d="M 10,230 L 10,240 L 20,240" fill="none" stroke="#ff0055" stroke-width="2"/>
  <path d="M 390,230 L 390,240 L 380,240" fill="none" stroke="#ff0055" stroke-width="2"/>
</svg>

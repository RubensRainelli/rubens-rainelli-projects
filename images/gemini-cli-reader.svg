<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0a0a0f"/>
  
  <!-- Cyber Grid -->
  <path d="M 0,50 L 400,50 M 0,100 L 400,100 M 0,150 L 400,150 M 0,200 L 400,200 M 50,0 L 50,250 M 100,0 L 100,250 M 150,0 L 150,250 M 200,0 L 200,250 M 250,0 L 250,250 M 300,0 L 300,250 M 350,0 L 350,250" stroke="#141424" stroke-width="1"/>
  
  <!-- Glowing Effects -->
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-yellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Glowing background Star -->
  <g transform="translate(300, 75)" opacity="0.25">
    <path d="M 0,-30 C 0,-10 10,0 30,0 C 10,0 0,10 0,30 C 0,10 -10,0 -30,0 C -10,0 0,-10 0,-30 Z" fill="#00f0ff" filter="url(#glow-cyan)"/>
  </g>

  <!-- Chat Log Layout -->
  <g transform="translate(30, 40)">
    <!-- Terminal Window Frame -->
    <rect x="0" y="0" width="340" height="170" rx="6" fill="#0c0c16" stroke="#00f0ff" stroke-width="2" filter="url(#glow-cyan)"/>
    
    <!-- Titlebar -->
    <line x1="0" y1="25" x2="340" y2="25" stroke="#00f0ff" stroke-width="1.5"/>
    <circle cx="15" cy="12.5" r="4" fill="#ff0055"/>
    <circle cx="30" cy="12.5" r="4" fill="#fefe00"/>
    <circle cx="45" cy="12.5" r="4" fill="#39ff14"/>
    <text x="170" y="17" fill="#00f0ff" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="1">GEMINI_CLI_READER.sh</text>

    <!-- Message Bubble 1: Agent (Left) -->
    <g transform="translate(15, 40)">
      <path d="M 0,0 L 220,0 A 5,5 0 0 1 225,5 L 225,30 A 5,5 0 0 1 220,35 L 10,35 L 0,45 Z" fill="#14142a" stroke="#ff0055" stroke-width="1" opacity="0.9"/>
      <text x="12" y="15" fill="#ff0055" font-family="monospace" font-size="9" font-weight="bold">> USER_PROMPT</text>
      <text x="12" y="27" fill="#ffffff" font-family="sans-serif" font-size="8">Analyze my local log directory...</text>
    </g>

    <!-- Message Bubble 2: Gemini (Right) -->
    <g transform="translate(90, 95)">
      <path d="M 10,0 L 235,0 L 235,45 A 5,5 0 0 1 230,50 L 10,50 A 5,5 0 0 1 5,45 L 5,10 Z" fill="#0d1f2d" stroke="#00f0ff" stroke-width="1" opacity="0.9"/>
      <text x="15" y="15" fill="#00f0ff" font-family="monospace" font-size="9" font-weight="bold">> GEMINI_RESPONSE [THINKING...]</text>
      
      <!-- Tiny Sparkle Icon -->
      <path d="M 220,10 C 220,13 222,15 225,15 C 222,15 220,17 220,20 C 220,17 218,15 215,15 C 218,15 220,13 220,10 Z" fill="#fefe00" filter="url(#glow-yellow)"/>

      <!-- Fake Log content -->
      <text x="15" y="28" fill="#39ff14" font-family="monospace" font-size="7.5">Checking 12 log files...</text>
      <text x="15" y="38" fill="#ffffff" font-family="sans-serif" font-size="8">Found 3 Chain-of-Thought paths.</text>
    </g>
    
    <!-- Code cursor -->
    <rect x="15" y="153" width="6" height="10" fill="#39ff14">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
    <text x="25" y="161" fill="#39ff14" font-family="monospace" font-size="8">WAITING_FOR_LOGS...</text>
  </g>

  <!-- Corners -->
  <path d="M 10,20 L 10,10 L 20,10" fill="none" stroke="#00f0ff" stroke-width="2"/>
  <path d="M 390,20 L 390,10 L 380,10" fill="none" stroke="#00f0ff" stroke-width="2"/>
  <path d="M 10,230 L 10,240 L 20,240" fill="none" stroke="#00f0ff" stroke-width="2"/>
  <path d="M 390,230 L 390,240 L 380,240" fill="none" stroke="#00f0ff" stroke-width="2"/>
</svg>

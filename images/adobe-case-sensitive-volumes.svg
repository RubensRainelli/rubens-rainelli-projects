<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0a0a0f"/>
  
  <!-- Cyber Grid -->
  <path d="M 0,50 L 400,50 M 0,100 L 400,100 M 0,150 L 400,150 M 0,200 L 400,200 M 50,0 L 50,250 M 100,0 L 100,250 M 150,0 L 150,250 M 200,0 L 200,250 M 250,0 L 250,250 M 300,0 L 300,250 M 350,0 L 350,250" stroke="#141424" stroke-width="1"/>
  
  <!-- Glowing Effects -->
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-yellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Hard Drive / Storage Symbol -->
  <g transform="translate(200, 120)">
    <!-- Tech Frame -->
    <rect x="-80" y="-70" width="160" height="140" rx="8" fill="#0d0d18" stroke="#fefe00" stroke-width="2" filter="url(#glow-yellow)"/>
    
    <!-- Hard Drive Disk Platter outlines -->
    <circle cx="-20" cy="0" r="45" fill="none" stroke="#00f0ff" stroke-width="1.5" filter="url(#glow-cyan)" opacity="0.6"/>
    <circle cx="-20" cy="0" r="15" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
    
    <!-- Actuator Arm -->
    <path d="M 50,45 L 10,15 L -10,0" fill="none" stroke="#00f0ff" stroke-width="2"/>
    <circle cx="50" cy="45" r="4" fill="#00f0ff"/>
    
    <!-- Case Sensitivity Visual: 'A' vs 'a' -->
    <g transform="translate(40, -20)">
      <!-- Cyber background hex -->
      <polygon points="0,-25 22,-12 22,12 0,25 -22,12 -22,-12" fill="#0c0c16" stroke="#00f0ff" stroke-width="1" filter="url(#glow-cyan)"/>
      <text x="0" y="5" fill="#00f0ff" font-family="'Courier New', monospace" font-size="16" font-weight="bold" text-anchor="middle">A ≠ a</text>
    </g>
    
    <!-- Redirection Bypass Link/Chain -->
    <g transform="translate(-50, 45)">
      <!-- Safe Lock icon -->
      <rect x="-10" y="-5" width="20" height="15" rx="2" fill="#39ff14" opacity="0.8"/>
      <path d="M -6,-5 L -6,-10 C -6,-13 6,-13 6,-10 L 6,-5" fill="none" stroke="#39ff14" stroke-width="2"/>
    </g>
    
    <!-- Status text inside -->
    <text x="0" y="60" fill="#fefe00" font-family="monospace" font-size="8" text-anchor="middle" font-weight="bold" letter-spacing="1">BYPASS_VOLUME_LIMIT: ON</text>
  </g>

  <!-- Side UI indicators -->
  <text x="25" y="32" fill="#00f0ff" font-family="monospace" font-size="9" opacity="0.8">> LD_PRELOAD_ACTIVE</text>
  
  <!-- Corners -->
  <path d="M 10,20 L 10,10 L 20,10" fill="none" stroke="#fefe00" stroke-width="2"/>
  <path d="M 390,20 L 390,10 L 380,10" fill="none" stroke="#fefe00" stroke-width="2"/>
  <path d="M 10,230 L 10,240 L 20,240" fill="none" stroke="#fefe00" stroke-width="2"/>
  <path d="M 390,230 L 390,240 L 380,240" fill="none" stroke="#fefe00" stroke-width="2"/>
</svg>
